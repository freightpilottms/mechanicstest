<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f1117" />
    <title>Mechanic IQ Offline</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #090b10;
        color: #f4f4f5;
        font-family: Arial, Helvetica, sans-serif;
      }

      main {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 24px;
      }

      section {
        width: min(560px, 100%);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.06);
        padding: 28px;
      }

      p:first-child {
        margin: 0;
        color: #fb923c;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      h1 {
        margin: 16px 0 0;
        font-size: clamp(36px, 8vw, 60px);
        line-height: 0.96;
      }

      p {
        margin: 18px 0 0;
        color: #d4d4d8;
        font-size: 18px;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <p>Mechanic IQ</p>
        <h1>Offline Garage</h1>
        <p>
          You are offline. Reconnect to load new diagnostic jobs and submit
          scores.
        </p>
      </section>
    </main>
  </body>
</html>
